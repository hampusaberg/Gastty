name: Gastty
options:
  bundleIdPrefix: com.hampusaberg
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.7.5"
    CURRENT_PROJECT_VERSION: "15"
    ARCHS: "$(ARCHS_STANDARD)"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: Gastty

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  Gastty:
    type: application
    platform: macOS
    sources:
      - path: Sources/TerminalApp
      - path: Resources/default.conf
        buildPhase: resources
      - path: Resources/AppIcon.icns
        buildPhase: resources
      - path: Resources/terminfo
        buildPhase: resources
        type: folder
      - path: Resources/ghostty
        buildPhase: resources
        type: folder
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
        codeSign: false
        link: true
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hampusaberg.Gastty
        # We ship a static Info.plist (not GENERATE_INFOPLIST_FILE) because
        # Xcode's auto-generated plist only honors a documented subset of
        # INFOPLIST_KEY_* settings and silently drops the rest (CFBundleIconFile,
        # NSHighResolutionCapable, …). Owning the file gives full control.
        INFOPLIST_FILE: Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/TerminalApp/Terminal.entitlements
        CLANG_CXX_LIBRARY: libc++
        OTHER_LDFLAGS:
          - "-lc++"
          - "-framework"
          - Carbon
          - "-framework"
          - Metal
          - "-framework"
          - MetalKit
          - "-framework"
          - MetalPerformanceShaders
          - "-framework"
          - QuartzCore
          - "-framework"
          - AppKit
          - "-framework"
          - CoreText
          - "-framework"
          - UniformTypeIdentifiers
          - "-framework"
          - UserNotifications
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
