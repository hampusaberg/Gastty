name: Gastty
options:
  bundleIdPrefix: com.hampusaberg
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ARCHS: "$(ARCHS_STANDARD)"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: Gastty

packages: {}

targets:
  Gastty:
    type: application
    platform: macOS
    sources:
      - path: Sources/TerminalApp
      - path: Resources/default.conf
        buildPhase: resources
      - path: Resources/terminfo
        buildPhase: resources
        type: folder
      - path: Resources/ghostty
        buildPhase: resources
        type: folder
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
        codeSign: false
        link: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hampusaberg.Gastty
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_LSMinimumSystemVersion: "13.0"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Hampus Åberg"
        INFOPLIST_KEY_CFBundleDisplayName: Gastty
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/TerminalApp/Terminal.entitlements
        CLANG_CXX_LIBRARY: libc++
        OTHER_LDFLAGS:
          - "-lc++"
          - "-framework"
          - Carbon
          - "-framework"
          - Metal
          - "-framework"
          - MetalKit
          - "-framework"
          - MetalPerformanceShaders
          - "-framework"
          - QuartzCore
          - "-framework"
          - AppKit
          - "-framework"
          - CoreText
          - "-framework"
          - UniformTypeIdentifiers
          - "-framework"
          - UserNotifications
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Frameworks"
