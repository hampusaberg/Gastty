name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build tools
        run: brew install zig@0.15 xcodegen xcbeautify

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          # Just the submodule's local cache — `~/.cache/zig` doesn't exist
          # on macOS runners and including it warned then failed the step.
          path: vendor/ghostty/.zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('vendor/ghostty/build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-

      - name: Build libghostty xcframework
        # The script itself adds /opt/homebrew/opt/zig@0.15/bin to PATH —
        # no need to override PATH here (and `${{ env.PATH }}` doesn't
        # actually interpolate to the runner's PATH).
        run: ./scripts/build-libghostty.sh

      - name: Generate Xcode project
        run: xcodegen

      - name: Build Gastty (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project Gastty.xcodeproj \
            -scheme Gastty \
            -configuration Debug \
            -derivedDataPath build/ \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions

  lint:
    name: SwiftLint
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      # No `--strict` — that makes any warning fail the build, which is
      # too aggressive for an evolving codebase. Warnings still surface in
      # the run log; only actual errors (violations marked `error:`) fail.
      - name: Run SwiftLint
        run: swiftlint --quiet Sources/
