name: CI

on:
  push:
    branches: [main]
    # Doc-only and metadata-only changes don't affect the build or the
    # binary, so skip CI for them. Keeps the Actions tab readable and
    # gives a green main bar straight after a README edit. Note: if
    # branch protection ever requires CI as a status check, this will
    # leave doc-only PRs unable to merge — switch to a workflow_run
    # neutral job at that point.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/dependabot.yml'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/dependabot.yml'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install build tools
        run: brew install zig@0.15 xcodegen xcbeautify

      - name: Cache Zig build artifacts
        uses: actions/cache@v5
        with:
          # Just the submodule's local cache — `~/.cache/zig` doesn't exist
          # on macOS runners and including it warned then failed the step.
          path: vendor/ghostty/.zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('vendor/ghostty/build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-

      - name: Build libghostty xcframework
        # The script itself adds /opt/homebrew/opt/zig@0.15/bin to PATH —
        # no need to override PATH here (and `${{ env.PATH }}` doesn't
        # actually interpolate to the runner's PATH).
        run: ./scripts/build-libghostty.sh

      - name: Generate Xcode project
        run: xcodegen

      - name: Build Gastty (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project Gastty.xcodeproj \
            -scheme Gastty \
            -configuration Debug \
            -derivedDataPath build/ \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions

  lint:
    name: SwiftLint
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install SwiftLint
        run: brew install swiftlint

      # No `--strict` — that makes any warning fail the build, which is
      # too aggressive for an evolving codebase. Warnings still surface in
      # the run log; only actual errors (violations marked `error:`) fail.
      - name: Run SwiftLint
        run: swiftlint --quiet Sources/
