name: Release

# Tag-driven release pipeline. Push a tag like `v0.1.0` and this builds a
# universal Release `.app`, wraps it in a DMG, and attaches it to a GitHub
# release. Signing + notarization are wired through repository secrets;
# if no signing identity is configured the build still produces an
# unsigned DMG (which users open with right-click → Open).
#
# Required secrets for a fully signed + notarized build:
#   MACOS_CERTIFICATE         - base64-encoded `.p12` Developer ID Application
#   MACOS_CERTIFICATE_PWD     - password for that .p12
#   MACOS_KEYCHAIN_PASSWORD   - any string (used to create a temp keychain)
#   MACOS_NOTARIZATION_USER   - Apple ID
#   MACOS_NOTARIZATION_PWD    - app-specific password
#   MACOS_NOTARIZATION_TEAM   - Team ID
#
# Without those secrets the steps that need them are skipped, so a public
# fork can still build an unsigned release artifact.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.0) when running manually'
        required: false
        default: 'v0.0.0-dev'

permissions:
  # `softprops/action-gh-release` creates/updates a release and uploads
  # assets via the GitHub API, both of which require `contents: write`.
  # Without this the step fails with 403 "Resource not accessible by
  # integration".
  contents: write

concurrency:
  # Two layers of concurrency.
  #
  # 1. \`docs-publish\` is shared with \`release-notes.yml\`: this stops
  #    the appcast push and the release-notes HTML push from racing
  #    each other on the \`docs/\` directory in main. Whichever workflow
  #    starts second waits.
  # 2. We don't cancel in-progress release builds even if a second tag
  #    push lands quickly — the queued build still ships a DMG that
  #    matters. \`cancel-in-progress: false\` is the default; spelled
  #    out for clarity.
  group: docs-publish
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          # Full history so the post-build step can commit the appcast
          # update back to main without "non-fast-forward" complaints.
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tools
        run: |
          brew update
          brew install zig@0.15 xcodegen create-dmg

      - name: Cache Zig package downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/zig
            vendor/ghostty/.zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('vendor/ghostty/build.zig.zon') }}

      - name: Build libghostty xcframework (universal)
        # Release builds ship the universal slice (macos-arm64 + x86_64)
        # so Intel Mac users can run the resulting .app.
        env:
          XCFRAMEWORK_TARGET: universal
        run: ./scripts/build-libghostty.sh

      - name: Generate Xcode project
        run: xcodegen

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/certificate.p12

      - name: Build Release .app
        run: |
          xcodebuild \
            -project Gastty.xcodeproj \
            -scheme Gastty \
            -configuration Release \
            -derivedDataPath build/ \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            build

      - name: Notarize and staple
        if: env.MACOS_NOTARIZATION_USER != ''
        env:
          MACOS_NOTARIZATION_USER: ${{ secrets.MACOS_NOTARIZATION_USER }}
          MACOS_NOTARIZATION_PWD: ${{ secrets.MACOS_NOTARIZATION_PWD }}
          MACOS_NOTARIZATION_TEAM: ${{ secrets.MACOS_NOTARIZATION_TEAM }}
        run: |
          APP_PATH="build/Build/Products/Release/Gastty.app"
          ditto -c -k --keepParent "$APP_PATH" /tmp/Gastty.zip
          xcrun notarytool submit /tmp/Gastty.zip \
            --apple-id "$MACOS_NOTARIZATION_USER" \
            --password "$MACOS_NOTARIZATION_PWD" \
            --team-id "$MACOS_NOTARIZATION_TEAM" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/Gastty.app"
          create-dmg \
            --volname "Gastty ${{ steps.tag.outputs.name }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Gastty.app" 160 200 \
            --hide-extension "Gastty.app" \
            --app-drop-link 440 200 \
            --no-internet-enable \
            "Gastty-${{ steps.tag.outputs.name }}.dmg" \
            "$APP_PATH" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Gastty-${{ steps.tag.outputs.name }}
          path: Gastty-${{ steps.tag.outputs.name }}.dmg

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: Gastty-${{ steps.tag.outputs.name }}.dmg
          generate_release_notes: true

      # ---------- Sparkle: sign DMG + update appcast ----------
      # Everything below runs only when triggered by a real tag push,
      # not for `workflow_dispatch` test runs that produce a
      # `v0.0.0-dev` artifact.
      - name: Download Sparkle CLI tools
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -L -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/2.9.2/Sparkle-2.9.2.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle

      - name: Sign DMG with Sparkle EdDSA key
        id: sparkle_sign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Validate the secret exists at all so a missing-secret
          # config error fails loudly instead of producing a cryptic
          # sign_update error.
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "::error::SPARKLE_PRIVATE_KEY repo secret is missing or empty."
            exit 1
          fi

          # Write the private key to a temp file. `sign_update` reads
          # from file or keychain; CI runners don't have a keychain.
          # `tr -d` strips surrounding whitespace (common pasting hazard)
          # without touching the key contents — Sparkle's key is a
          # single base64 line of [A-Za-z0-9+/=].
          KEY_FILE=$(mktemp)
          printf '%s' "$SPARKLE_PRIVATE_KEY" | tr -d ' \n\r\t' > "$KEY_FILE"
          KEY_LEN=$(wc -c < "$KEY_FILE")
          echo "Key file length: $KEY_LEN bytes"

          DMG="Gastty-${{ steps.tag.outputs.name }}.dmg"
          if [ ! -f "$DMG" ]; then
            echo "::error::DMG not found at $DMG"
            ls -la *.dmg || true
            exit 1
          fi

          # Capture sign_update output and exit code separately so we
          # can print useful diagnostics if signing fails.
          set +e
          OUT=$(/tmp/sparkle/bin/sign_update "$DMG" -f "$KEY_FILE" 2>&1)
          RC=$?
          set -e
          rm -f "$KEY_FILE"

          if [ $RC -ne 0 ]; then
            echo "::error::sign_update exited with $RC"
            echo "stderr+stdout was:"
            echo "$OUT"
            exit $RC
          fi

          # Expect a single line:
          #   sparkle:edSignature="..." length="..."
          echo "Signature output: $OUT"
          if ! echo "$OUT" | grep -q 'sparkle:edSignature='; then
            echo "::error::sign_update produced unexpected output (no edSignature)."
            exit 1
          fi

          # Save to GITHUB_OUTPUT as a single line (sign_update output
          # is always one line — keep it simple, no heredoc).
          echo "sig_attrs=$OUT" >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION_TAG: ${{ steps.tag.outputs.name }}
          SIG_ATTRS: ${{ steps.sparkle_sign.outputs.sig_attrs }}
        run: |
          # Strip leading `v` from the tag for the marketing version
          # (Sparkle's shortVersionString expects 0.7.0, not v0.7.0).
          SHORT_VERSION="${VERSION_TAG#v}"
          APP_PATH="build/Build/Products/Release/Gastty.app"
          BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" \
            "$APP_PATH/Contents/Info.plist")
          PUB_DATE=$(LC_TIME=en_US.UTF-8 date -u +"%a, %d %b %Y %H:%M:%S +0000")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$VERSION_TAG/Gastty-$VERSION_TAG.dmg"
          # Sparkle's update dialog loads this URL in its WebView. We
          # point it at our own clean, prefers-color-scheme-aware HTML
          # page hosted on Pages, generated by `release-notes.yml` from
          # the GitHub release body. That workflow regenerates the page
          # on every release edit, so typo fixes and polished notes
          # show up automatically — no need to re-tag.
          NOTES_URL="https://hampusaberg.github.io/Gastty/releases/$VERSION_TAG.html"
          python3 scripts/append-appcast-entry.py \
            --version "$SHORT_VERSION" \
            --build "$BUILD" \
            --pub-date "$PUB_DATE" \
            --url "$DOWNLOAD_URL" \
            --release-url "$NOTES_URL" \
            --sig-attrs "$SIG_ATTRS" \
            docs/appcast.xml

      - name: Commit and push appcast update
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          if git diff --cached --quiet; then
            echo "No changes to appcast.xml — nothing to push."
            exit 0
          fi
          git commit -m "docs: publish appcast entry for ${{ steps.tag.outputs.name }} [skip ci]"
          # Rebase onto whatever's on main right now. The concurrency
          # group with release-notes.yml prevents the obvious race, but
          # this is cheap insurance.
          git pull --rebase origin main
          git push origin HEAD:main
