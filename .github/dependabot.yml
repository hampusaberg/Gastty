version: 2
updates:
  # Keep CI / release workflow actions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  # Submodule updates (vendor/ghostty pinned at a SHA). Dependabot's
  # `gitsubmodule` ecosystem proposes a bump whenever upstream Ghostty moves
  # forward; we review and merge deliberately because libghostty's C API is
  # not yet stable.
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - libghostty

  # Swift Packages — currently just Sparkle (the auto-updater). Within
  # the 2.x major version anything Dependabot proposes (patch + minor)
  # is safe to merge straight away. A 3.x bump would arrive as a
  # major-version PR; treat that as a real review rather than a
  # routine merge.
  - package-ecosystem: swift
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - swift-package
