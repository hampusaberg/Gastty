# Default configuration for Terminal.
#
# Loaded BEFORE the user's ~/.config/ghostty/config so that the user can
# override any value here.
#
# This file uses the same syntax as Ghostty's config.
# See: https://ghostty.org/docs/config

# Skinnier cursor than the default block.
cursor-style = bar
cursor-style-blink = true

# Slightly smaller default font so the cursor bar isn't huge.
font-size = 13

# Pane navigation: ⌘[ / ⌘] (libghostty's default) cycles through panes in
# document order. Mouse-click on a pane also focuses it. Directional
# ⌥⌘+arrows were tried and removed — mouse + cycle covers the cases.

# Dim unfocused panes so the focused one stands out and the hollow-block
# cursor that libghostty draws on unfocused panes is much less prominent.
# 1.0 = no dimming, 0.5 = strong dim. 0.7 feels about right; tune to taste.
unfocused-split-opacity = 0.7
